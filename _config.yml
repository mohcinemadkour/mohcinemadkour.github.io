# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Mohcine Madkour
first_name: Mohcine
middle_name:
last_name: Madkour
contact_note: >
  Best reached via LinkedIn or email for professional inquiries.
description: >
  Senior AI/ML Engineer & Architect | PhD in Computer Science | LangGraph · LangSmith · RAG · MLOps · Healthcare AI
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: AI, ML, LLM, RAG, LangGraph, MLOps, healthcare AI, agentic AI, computer vision, deep learning
lang: en
icon: 🤖

url: https://mohcinemadkour.github.io
baseurl: ""
last_updated: true
back_to_top: true

# Theme
repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# Layout
navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 960px
enable_navbar_social: true
enable_darkmode: true
enable_math: true
enable_masonry: true
enable_project_categories: true

# Open Graph
serve_og_meta: true
serve_schema_org: true

# Blog
blog_name: Mohcine's Writing
blog_description: Thoughts on AI, MLOps, and production machine learning
permalink: /writing/:year/:title/
lsi: false

pagination:
  enabled: true
  per_page: 8
  permalink: /page/:num/
  title: ":title - page :num"
  limit: 0
  sort_field: date
  sort_reverse: true

related_blog_posts:
  enabled: true
  max_related: 3

# Collections
collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  teachings:
    output: true
    permalink: /teaching/:path/
  talks:
    output: true
    permalink: /talks/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

# Jekyll settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages", "_scripts"]
exclude:
  - bin/
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - INSTALL.md
  - LICENSE
  - package.json
  - package-lock.json
  - purgecss.config.js
  - README.md
  - readme_preview/
  - TROUBLESHOOTING.md
  - vendor
  - _pages/about_einstein.md
keep_files:
  - CNAME
  - .nojekyll

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      category: writing
  - scope:
      path: ""
      type: projects
    values:
      layout: page
  - scope:
      path: ""
      type: teachings
    values:
      layout: page
  - scope:
      path: ""
      type: talks
    values:
      layout: page

# Scholar
scholar:
  last_name: [Madkour]
  first_name: [Mohcine, M.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  group_by: year
  group_order: descending

enable_publication_badges:
  altmetric: true
  dimensions: true
  google_scholar: true

filtered_bibtex_keywords:
  [abbr, abstract, additional_info, altmetric, annotation, arxiv, award, award_name,
   bibtex_show, blog, code, html, pdf, poster, preview, selected, slides, supp, video, website]

max_author_limit: 3
more_authors_animation_delay: 10

plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

github_username: mohcinemadkour
repositories:
  github_users: [mohcinemadkour]
  github_repos:
