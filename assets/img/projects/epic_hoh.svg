<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540"/>
      <stop offset="100%" style="stop-color:#0E3A52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#06B6A4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect width="800" height="5" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="-60" r="220" fill="#0E3A52" opacity="0.6"/>
  <circle cx="80" cy="520" r="180" fill="#0c324a" opacity="0.5"/>

  <!-- Eyebrow label -->
  <text x="56" y="68" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#06B6A4" letter-spacing="3">CASE STUDY · HEALTHCARE INTEROPERABILITY</text>

  <!-- Title -->
  <text x="56" y="112" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#ffffff">Bidirectional Epic Integration</text>
  <text x="56" y="148" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#ffffff">for Hospital-at-Home</text>

  <!-- Subtitle -->
  <text x="56" y="185" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#CAD8E8">HL7 v2 + FHIR R4 · Mirth Connect · FastAPI · Azure · HIPAA-ready</text>

  <!-- Pipeline boxes -->
  <!-- Epic box -->
  <rect x="56" y="230" width="170" height="70" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="141" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Epic (EHR)</text>
  <text x="141" y="278" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8BA3BC" text-anchor="middle">HL7 v2 / MLLP</text>
  <text x="141" y="292" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8BA3BC" text-anchor="middle">FHIR R4 / OAuth2</text>

  <!-- Arrow 1 -->
  <text x="245" y="272" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#06B6A4" text-anchor="middle">⇄</text>

  <!-- Engine box (highlighted) -->
  <rect x="272" y="218" width="256" height="94" rx="10" fill="#0E7490"/>
  <text x="400" y="245" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Integration Engine</text>
  <text x="400" y="263" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#CAF0F8" text-anchor="middle">Mirth Connect + Python / FastAPI</text>
  <text x="400" y="279" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#CAF0F8" text-anchor="middle">dedup · retry · dead-letter · audit</text>
  <text x="400" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#CAF0F8" text-anchor="middle">PostgreSQL</text>

  <!-- Arrow 2 -->
  <text x="555" y="272" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#06B6A4" text-anchor="middle">⇄</text>

  <!-- HaH box -->
  <rect x="574" y="230" width="170" height="70" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="659" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">HaH Platform</text>
  <text x="659" y="278" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8BA3BC" text-anchor="middle">Care-coord API</text>
  <text x="659" y="292" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8BA3BC" text-anchor="middle">React / Azure</text>

  <!-- Stats row -->
  <rect x="56" y="340" width="158" height="68" rx="8" fill="#0d2035" stroke="#1E293B" stroke-width="1"/>
  <text x="135" y="368" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#0E7490" text-anchor="middle">2</text>
  <text x="135" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">directions wired</text>

  <rect x="228" y="340" width="158" height="68" rx="8" fill="#0d2035" stroke="#1E293B" stroke-width="1"/>
  <text x="307" y="368" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#0E7490" text-anchor="middle">5</text>
  <text x="307" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">FHIR resources</text>

  <rect x="400" y="340" width="158" height="68" rx="8" fill="#0d2035" stroke="#1E293B" stroke-width="1"/>
  <text x="479" y="368" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#0E7490" text-anchor="middle">14</text>
  <text x="479" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">tests passing</text>

  <rect x="572" y="340" width="158" height="68" rx="8" fill="#0d2035" stroke="#1E293B" stroke-width="1"/>
  <text x="651" y="368" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#06B6A4" text-anchor="middle">0</text>
  <text x="651" y="390" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">messages dropped</text>

  <!-- Footer line -->
  <text x="56" y="432" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">Mohcine Madkour, PhD · Senior AI/ML Engineer &amp; Healthcare Integration Architect</text>
</svg>
