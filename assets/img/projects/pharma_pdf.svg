<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="50%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#06B6A4"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect width="800" height="5" fill="url(#accent)"/>

  <!-- Subtle decorative circles -->
  <circle cx="720" cy="-80" r="260" fill="#0E3A52" opacity="0.4"/>
  <circle cx="60" cy="540" r="200" fill="#0c324a" opacity="0.35"/>

