  <text x="312" y="381" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">Claude AI + OCR</text>

  <rect x="372" y="362" width="88" height="28" rx="6" fill="#1c1917" stroke="#44403c" stroke-width="1"/>
  <text x="416" y="381" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d6d3d1" text-anchor="middle">FastAPI + React</text>

  <!-- Footer -->
  <text x="56" y="430" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Mohcine Madkour, PhD · AI/ML Engineer · Regulatory Document Intelligence · PDFD v1.0</text>
