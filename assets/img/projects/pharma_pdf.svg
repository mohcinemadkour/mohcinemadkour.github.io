  <text x="572" y="299" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#0E7490" text-anchor="middle">10+</text>
  <text x="572" y="315" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Extraction</text>
  <text x="572" y="328" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Engines</text>

  <rect x="636" y="268" width="108" height="76" rx="8" fill="#0d2035" stroke="#1E293B" stroke-width="1"/>
  <text x="690" y="299" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#0E7490" text-anchor="middle">100%</text>
  <text x="690" y="315" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Source</text>
  <text x="690" y="328" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Citations</text>

  <!-- Bottom badges -->
  <rect x="56" y="362" width="104" height="28" rx="6" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1"/>
  <text x="108" y="381" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">21 CFR Part 11</text>

  <rect x="172" y="362" width="80" height="28" rx="6" fill="#052e16" stroke="#14532d" stroke-width="1"/>
  <text x="212" y="381" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">GMP-Ready</text>

