  <text x="56" y="64" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#dc2626" letter-spacing="3">REGULATORY AI · DOCUMENT INTELLIGENCE</text>

  <!-- Title line 1 -->
  <text x="56" y="104" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#ffffff">Pharma PDF → Word Extraction</text>
  <!-- Title line 2 -->
