  <text x="72" y="305" font-family="JetBrains Mono, monospace" font-size="10" fill="#06B6A4">Total Impurities:  0.42 %</text>
  <text x="72" y="320" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748B">  [Src: CoA_Batch2024.pdf, p.3, Sec: 2.2 Impurity Profile]</text>
  <text x="72" y="336" font-family="JetBrains Mono, monospace" font-size="10" fill="#06B6A4">Retest Date:       2026-08</text>
  <text x="72" y="334" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748B">  </text>

