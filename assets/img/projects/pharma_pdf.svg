  <text x="210" y="219" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">→</text>

  <text x="232" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0E7490">10 ENGINES</text>
  <text x="232" y="235" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">Extract in parallel</text>

  <text x="356" y="219" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">→</text>

  <text x="378" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#065f46">PROVENANCE</text>
  <text x="378" y="235" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">key · page · bbox · confidence</text>

  <text x="516" y="219" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">→</text>

  <text x="538" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">MAP + POPULATE</text>
  <text x="538" y="235" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">Word + inline citations</text>

  <text x="674" y="219" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">→</text>

  <text x="694" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#d97706">AUDIT</text>
  <text x="694" y="235" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B">JSONL · ZIP</text>

